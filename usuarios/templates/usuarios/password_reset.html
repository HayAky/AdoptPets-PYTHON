{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/componentes.css' %}">
{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">

        <h2>Recuperar Contraseña</h2>
        <p class="subtitle">Ingresa el correo electrónico asociado a tu cuenta y te enviaremos las instrucciones.</p>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-submit">Enviar Enlace de Recuperación</button>
        </form>

        <a href="{% url 'login' %}" class="back-link">← Volver al inicio de sesión</a>
    </div>
</div>
{% endblock %}
