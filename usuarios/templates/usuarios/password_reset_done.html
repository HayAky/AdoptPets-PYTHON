{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/componentes.css' %}">
{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div style="width: 60px; height: 60px; background: #dbeafe; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; margin: 0 auto 20px auto;">
            📧
        </div>

        <h2>¡Correo Enviado!</h2>
        <p class="subtitle" style="margin-bottom: 20px;">
            Revisa tu bandeja de entrada (o la terminal de PyCharm). Te hemos enviado las instrucciones para restablecer tu acceso.
        </p>

        <a href="{% url 'login' %}" class="back-link">← Volver al inicio de sesión</a>
    </div>
</div>
{% endblock %}
