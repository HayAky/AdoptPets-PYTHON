{% extends 'base.html' %}
{% load static %}

{% block title %}Redactar Blog - AdoptPets{% endblock %}
{% block extra_css %}<link href="{% static 'css/admin_listas.css' %}" rel="stylesheet">{% endblock %}

{% block content %}
<div class="admin-layout">
    <main class="main-content">
        <div class="page-header">
            <h1>{% if blog %}Editar Blog{% else %}Nuevo Artículo de Blog{% endif %}</h1>
            <a href="{% url 'admin_lista_blogs' %}" class="btn btn-secondary">← Volver</a>
        </div>

        <div class="content-card form-container"></div>
            <form method="post" action="">
                {% csrf_token %}
                
                <div class="form-group">
                    <label style="display: block; font-weight: bold; margin-bottom: 8px;">Título *</label>
                    <input type="text" name="titulo" value="{{ blog.titulo|default:'' }}" required style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px;">
                </div>

                <div style="display: flex; gap: 20px; margin-bottom: 20px;">
                    <div style="flex: 1;">
                        <label style="display: block; font-weight: bold; margin-bottom: 8px;">Categoría</label>
                        <select name="categoria" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc;">
                            <option value="">-- Seleccionar --</option>
                            {% for valor, etiqueta in categorias %}
                                <option value="{{ valor }}" {% if blog.categoria == valor %}selected{% endif %}>{{ etiqueta }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div style="flex: 1;">
                        <label style="display: block; font-weight: bold; margin-bottom: 8px;">URL de Imagen Destacada</label>
                        <input type="text" name="imagen_url" value="{{ blog.imagen_url|default:'' }}" placeholder="https://..." style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc;">
                    </div>
                </div>

                <div class="form-group">
                    <label style="display: block; font-weight: bold; margin-bottom: 8px;">Resumen Breve (Para la tarjeta)</label>
                    <input type="text" name="resumen" value="{{ blog.resumen|default:'' }}" maxlength="255" placeholder="Una o dos frases gancho..." style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc;">
                </div>

                <div class="form-group">
                    <label style="display: block; font-weight: bold; margin-bottom: 8px;">Contenido Completo *</label>
                    <textarea name="contenido" required style="width: 100%; height: 250px; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-family: inherit; resize: vertical;">{{ blog.contenido|default:'' }}</textarea>
                </div>

                <div style="margin-bottom: 30px; display: flex; align-items: center; gap: 10px;">
                    <input type="checkbox" name="activo" id="activo" style="width: 20px; height: 20px;" {% if not blog or blog.activo %}checked{% endif %}>
                    <label for="activo" style="cursor: pointer; font-weight: bold; color: #333;">Publicar en la página principal</label>
                </div>

                <button type="submit" class="btn btn-primary" style="padding: 12px 30px; font-size: 16px;">💾 Guardar Blog</button>
            </form>
        </div>
    </main>
</div>
{% endblock %}
